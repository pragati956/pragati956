<svg width="1600" height="500" viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">
<title>Pragati Singh — Full Stack MERN Developer, AI Enthusiast, MCA at MNNIT Allahabad</title>
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0B0F19"/>
    <stop offset="55%" stop-color="#0D1220"/>
    <stop offset="100%" stop-color="#111A30"/>
  </linearGradient>
  <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#67E8F9"/>
    <stop offset="55%" stop-color="#5EA9FF"/>
    <stop offset="100%" stop-color="#818CF8"/>
  </linearGradient>
  <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#22D3EE"/>
