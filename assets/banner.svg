<text x="954" y="292" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="17"><tspan fill="#7DD3FC">focus</tspan><tspan fill="#64748B">: </tspan><tspan fill="#FBBF24">"Generative AI"</tspan></text>
