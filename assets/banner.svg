  </filter>
  <pattern id="dotGrid" width="26" height="26" patternUnits="userSpaceOnUse">
    <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" fill-opacity="0.05"/>
  </pattern>
</defs>

<rect x="0" y="0" width="1600" height="500" fill="url(#bgGrad)"/>
